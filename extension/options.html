<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<link rel="stylesheet" href="tracker-styles.css">
	<style>
		:root {
			--bg-primary: #1e1e1e;
			--bg-secondary: #252526;
			--text-primary: #d4d4d4;
			--text-secondary: #9cdcfe;
			--button-bg: #2d2d2d;
			--button-hover: #3e3e3e;
			--button-active: #505050;
			--border-color: #454545;
			--input-bg: #1e1e1e;
			--input-border: #454545;
			--input-focus: #2c84db;
		}

		body {
			margin: 0;
			padding: 24px;
			background-color: var(--bg-primary);
			color: var(--text-primary);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			font-size: 14px;
			line-height: 1.6;
			min-width: 480px;
		}

		h1 {
			margin: 0 0 8px 0;
			font-size: 22px;
			font-weight: 600;
			color: var(--text-primary);
		}

		.subtitle {
			margin: 0 0 24px 0;
			color: var(--text-secondary);
			font-size: 13px;
		}

		.section {
			margin-bottom: 24px;
			padding-bottom: 24px;
			border-bottom: 1px solid var(--border-color);
		}

		.section:last-child {
			border-bottom: none;
			margin-bottom: 0;
			padding-bottom: 0;
		}

		.section-title {
			margin: 0 0 16px 0;
			font-size: 14px;
			font-weight: 600;
			color: var(--text-primary);
		}

		.field {
			margin-bottom: 16px;
		}

		.field:last-child {
			margin-bottom: 0;
		}

		label {
			display: block;
			margin-bottom: 6px;
			font-size: 13px;
			color: var(--text-secondary);
		}

		input[type="text"],
		input[type="password"] {
			width: 100%;
			box-sizing: border-box;
			padding: 10px 12px;
			background: var(--input-bg);
			border: 1px solid var(--input-border);
			border-radius: 6px;
			color: var(--text-primary);
			font-size: 13px;
			font-family: inherit;
			transition: border-color 0.2s, box-shadow 0.2s;
		}

		input[type="text"]:focus,
		input[type="password"]:focus {
			outline: none;
			border-color: var(--input-focus);
			box-shadow: 0 0 0 3px rgba(44, 132, 219, 0.2);
		}

		input::placeholder {
			color: #666;
		}

		.button-row {
			display: flex;
			gap: 12px;
			margin-top: 24px;
			padding-top: 16px;
			border-top: 1px solid var(--border-color);
		}

		button {
			padding: 10px 20px;
			background: var(--button-bg);
			color: var(--text-primary);
			border: 1px solid var(--border-color);
			border-radius: 6px;
			cursor: pointer;
			font-size: 13px;
			font-weight: 500;
			font-family: inherit;
			transition: background-color 0.2s, transform 0.1s;
		}

		button:hover {
			background: var(--button-hover);
		}

		button:active {
			background: var(--button-active);
			transform: translateY(1px);
		}

		button.primary {
			background: #2c84db;
			border-color: #2c84db;
			color: white;
		}

		button.primary:hover {
			background: #3a93e8;
		}

		button.primary:active {
			background: #2474c4;
		}

		.status {
			padding: 10px 12px;
			border-radius: 6px;
			font-size: 13px;
			margin-top: 12px;
			display: none;
		}

		.status.visible {
			display: block;
		}

		.status.info {
			background: rgba(44, 132, 219, 0.15);
			border: 1px solid rgba(44, 132, 219, 0.3);
			color: #5db0f5;
		}

		.status.success {
			background: rgba(34, 197, 94, 0.15);
			border: 1px solid rgba(34, 197, 94, 0.3);
			color: #4ade80;
		}

		.status.error {
			background: rgba(222, 41, 41, 0.15);
			border: 1px solid rgba(222, 41, 41, 0.3);
			color: #f87171;
		}

		.help-text {
			margin-top: 8px;
			font-size: 12px;
			color: #888;
			line-height: 1.5;
		}

		.help-text a {
			color: #2c84db;
			text-decoration: none;
		}

		.help-text a:hover {
			text-decoration: underline;
		}

		.password-wrapper {
			position: relative;
		}

		.password-toggle {
			position: absolute;
			right: 10px;
			top: 50%;
			transform: translateY(-50%);
			background: none;
			border: none;
			color: var(--text-secondary);
			cursor: pointer;
			padding: 4px;
			font-size: 14px;
			line-height: 1;
		}

		.password-toggle:hover {
			color: var(--text-primary);
		}
	</style>
</head>
<body>
	<h1>UsageOS Settings</h1>
	<p class="subtitle">Configure your UsageOS backend connection to sync usage data across devices.</p>

	<div class="section">
		<h2 class="section-title">Server Connection</h2>

		<div class="field">
			<label for="server-url">Server URL</label>
			<input type="text" id="server-url" placeholder="https://usageos.rishit.online" autocomplete="url">
			<p class="help-text">Your UsageOS backend URL. Must use HTTPS.</p>
		</div>

		<div class="field">
			<label for="api-key">API Key</label>
			<div class="password-wrapper">
				<input type="password" id="api-key" placeholder="sk_usageos_..." autocomplete="off">
				<button type="button" class="password-toggle" id="toggle-key" aria-label="Show/hide API key">👁</button>
			</div>
			<p class="help-text">Get your API key from the UsageOS dashboard.</p>
		</div>

		<div class="status" id="status"></div>
	</div>

	<div class="section">
		<div class="button-row">
			<button type="button" class="primary" id="save-btn">Save Settings</button>
			<button type="button" id="test-btn">Test Connection</button>
		</div>
	</div>

	<script src="lib/browser-polyfill.min.js"></script>
	<script src="options.js"></script>
</body>
</html>
