<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>UsageOS Dashboard</title>
	<link rel="stylesheet" href="tracker-styles.css">
	<style>
		:root {
			--bg-primary: #1e1e1e;
			--bg-secondary: #252526;
			--bg-tertiary: #2d2d2d;
			--text-primary: #d4d4d4;
			--text-secondary: #9cdcfe;
			--text-muted: #888;
			--button-bg: #2d2d2d;
			--button-hover: #3e3e3e;
			--button-active: #505050;
			--border-color: #454545;
			--accent-blue: #2c84db;
			--accent-green: #22c55e;
			--accent-amber: #f59e0b;
			--accent-red: #de2929;
			--card-radius: 8px;
			--shadow: 0 2px 8px rgba(0,0,0,0.3);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 24px;
			background-color: var(--bg-primary);
			color: var(--text-primary);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			font-size: 14px;
			line-height: 1.5;
			min-width: 900px;
		}

		.dashboard-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 24px;
			padding-bottom: 16px;
			border-bottom: 1px solid var(--border-color);
		}

		.dashboard-title {
			font-size: 24px;
			font-weight: 600;
			margin: 0;
			color: var(--text-primary);
		}

		.dashboard-subtitle {
			font-size: 13px;
			color: var(--text-muted);
			margin-top: 4px;
		}

		.header-actions {
			display: flex;
			gap: 8px;
		}

		.btn {
			background: var(--button-bg);
			color: var(--text-primary);
			border: 1px solid var(--border-color);
			padding: 8px 16px;
			border-radius: 4px;
			cursor: pointer;
			font-size: 13px;
			font-weight: 500;
			transition: background-color 0.2s, transform 0.1s;
		}

		.btn:hover {
			background: var(--button-hover);
		}

		.btn:active {
			background: var(--button-active);
			transform: translateY(1px);
		}

		.btn-primary {
			background: var(--accent-blue);
			border-color: var(--accent-blue);
			color: white;
		}

		.btn-primary:hover {
			background: #3a93e8;
		}

		.accounts-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
			gap: 16px;
		}

		.account-card {
			background: var(--bg-secondary);
			border: 1px solid var(--border-color);
			border-radius: var(--card-radius);
			padding: 20px;
			box-shadow: var(--shadow);
			transition: border-color 0.2s, box-shadow 0.2s;
		}

		.account-card:hover {
			border-color: #555;
			box-shadow: 0 4px 16px rgba(0,0,0,0.4);
		}

		.account-card.unavailable {
			opacity: 0.6;
			border-color: var(--accent-amber);
		}

		.account-header {
			display: flex;
			align-items: flex-start;
			gap: 12px;
			margin-bottom: 16px;
		}

		.account-avatar {
			width: 48px;
			height: 48px;
			border-radius: 50%;
			background: var(--accent-blue);
			color: white;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 18px;
			font-weight: 600;
			flex-shrink: 0;
		}

		.account-info {
			flex: 1;
			min-width: 0;
		}

		.account-name-row {
			display: flex;
			align-items: center;
			gap: 8px;
			margin-bottom: 4px;
		}

		.account-email {
			font-size: 13px;
			color: var(--text-secondary);
			margin: 0;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.account-nickname {
			font-size: 14px;
			font-weight: 500;
			margin: 0;
			color: var(--text-primary);
		}

		.account-nickname.editing {
			display: none;
		}

		.account-nickname-input {
			background: var(--bg-tertiary);
			border: 1px solid var(--border-color);
			border-radius: 4px;
			padding: 4px 8px;
			color: var(--text-primary);
			font-size: 14px;
			font-family: inherit;
			width: 100%;
			max-width: 250px;
		}

		.account-nickname-input:focus {
			outline: none;
			border-color: var(--accent-blue);
			box-shadow: 0 0 0 2px rgba(44, 132, 219, 0.2);
		}

		.status-badge {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			padding: 4px 10px;
			border-radius: 999px;
			font-size: 11px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.3px;
		}

		.status-badge.green { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
		.status-badge.amber { background: rgba(245, 158, 11, 0.15); color: var(--accent-amber); }
		.status-badge.red { background: rgba(222, 41, 41, 0.15); color: var(--accent-red); }
		.status-badge.gray { background: var(--bg-tertiary); color: var(--text-muted); }

		.status-dot {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: currentColor;
		}

		.usage-section {
			margin-top: 16px;
		}

		.usage-section h4 {
			font-size: 12px;
			font-weight: 600;
			color: var(--text-muted);
			text-transform: uppercase;
			letter-spacing: 0.5px;
			margin: 0 0 12px 0;
		}

		.limit-row {
			margin-bottom: 12px;
		}

		.limit-row:last-child {
			margin-bottom: 0;
		}

		.limit-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 6px;
		}

		.limit-label {
			font-size: 12px;
			color: var(--text-secondary);
			font-weight: 500;
		}

		.limit-percentage {
			font-size: 13px;
			font-weight: 600;
			font-variant-numeric: tabular-nums;
		}

		.limit-percentage.green { color: var(--accent-green); }
		.limit-percentage.amber { color: var(--accent-amber); }
		.limit-percentage.red { color: var(--accent-red); }

		.progress-track {
			height: 6px;
			background: var(--bg-tertiary);
			border-radius: 3px;
			overflow: hidden;
		}

		.progress-bar {
			height: 100%;
			border-radius: 3px;
			transition: width 0.3s ease;
		}

		.progress-bar.green { background: var(--accent-green); }
		.progress-bar.amber { background: var(--accent-amber); }
		.progress-bar.red { background: var(--accent-red); }
		.progress-bar.gray { background: var(--text-muted); }

		.limit-reset {
			font-size: 11px;
			color: var(--text-muted);
			margin-top: 4px;
			text-align: right;
		}

		.notes-section {
			margin-top: 20px;
			padding-top: 16px;
			border-top: 1px solid var(--border-color);
		}

		.notes-label {
			font-size: 12px;
			font-weight: 600;
			color: var(--text-muted);
			text-transform: uppercase;
			letter-spacing: 0.5px;
			margin-bottom: 8px;
			display: block;
		}

		.notes-textarea {
			width: 100%;
			background: var(--bg-tertiary);
			border: 1px solid var(--border-color);
			border-radius: 6px;
			padding: 10px 12px;
			color: var(--text-primary);
			font-size: 13px;
			font-family: inherit;
			line-height: 1.5;
			resize: vertical;
			min-height: 70px;
			max-height: 150px;
			transition: border-color 0.2s, box-shadow 0.2s;
		}

		.notes-textarea:focus {
			outline: none;
			border-color: var(--accent-blue);
			box-shadow: 0 0 0 2px rgba(44, 132, 219, 0.2);
		}

		.notes-textarea::placeholder {
			color: var(--text-muted);
		}

		.notes-saved-indicator {
			font-size: 11px;
			color: var(--text-muted);
			margin-top: 6px;
			text-align: right;
			opacity: 0;
			transition: opacity 0.2s;
		}

		.notes-saved-indicator.visible {
			opacity: 1;
		}

		.empty-state {
			text-align: center;
			padding: 48px 24px;
			color: var(--text-muted);
		}

		.empty-state-icon {
			font-size: 48px;
			margin-bottom: 16px;
			opacity: 0.5;
		}

		.loading-state {
			text-align: center;
			padding: 48px 24px;
			color: var(--text-secondary);
		}

		.loading-spinner {
			display: inline-block;
			width: 24px;
			height: 24px;
			border: 2px solid var(--border-color);
			border-top-color: var(--accent-blue);
			border-radius: 50%;
			animation: spin 1s linear infinite;
			margin-right: 12px;
			vertical-align: middle;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		.error-state {
			text-align: center;
			padding: 48px 24px;
			color: var(--accent-red);
		}

		.error-state button {
			margin-top: 16px;
		}
	</style>
</head>
<body>
	<header class="dashboard-header">
		<div>
			<h1 class="dashboard-title">UsageOS Dashboard</h1>
			<p class="dashboard-subtitle">Multi-account Claude.ai usage overview</p>
		</div>
		<div class="header-actions">
			<button class="btn" id="refresh-btn">Refresh</button>
			<button class="btn btn-primary" id="open-options">Settings</button>
		</div>
	</header>

	<main id="main-content">
		<div class="loading-state">
			<span class="loading-spinner"></span> Loading accounts...
		</div>
	</main>

	<script src="lib/browser-polyfill.min.js"></script>
	<script src="dashboard.js"></script>
</body>
</html>
